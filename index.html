<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HKS Law — Practice Management</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ── CONFIG — paste your values here after setup ── */
  /* SUPABASE_URL and SUPABASE_KEY go in the script below */

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
  .hidden{display:none!important}

  /* Login */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f5f0}
  .login-card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:32px;width:320px;text-align:center}
  .login-card h1{font-size:20px;font-weight:500;margin-bottom:4px}
  .login-card p{font-size:12px;color:#888;margin-bottom:24px}
  .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#333;transition:background 0.15s}
  .google-btn:hover{background:#f9f9f9}
  .login-error{font-size:12px;color:#c0392b;margin-top:12px}

  /* Shell */
  .shell{display:grid;grid-template-columns:200px 1fr;min-height:100vh}
  .sidebar{background:#fff;border-right:1px solid #e5e5e0;display:flex;flex-direction:column;padding:0}
  .sidebar-logo{padding:16px;border-bottom:1px solid #e5e5e0}
  .sidebar-logo .firm{font-size:14px;font-weight:500}
  .sidebar-logo .sub{font-size:11px;color:#888;margin-top:2px}
  .nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:13px;color:#666;border-left:2px solid transparent;transition:all 0.1s}
  .nav-item:hover{background:#f5f5f0;color:#1a1a1a}
  .nav-item.active{color:#3C3489;border-left-color:#534AB7;background:#EEEDFE}
  .nav-section{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:#aaa;padding:12px 16px 4px}
  .sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid #e5e5e0}
  .user-row{display:flex;align-items:center;gap:8px}
  .avatar{width:28px;height:28px;border-radius:50%;background:#EEEDFE;color:#3C3489;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .user-name{font-size:12px;font-weight:500}
  .user-role{font-size:11px;color:#888}
  .sign-out{font-size:11px;color:#888;cursor:pointer;margin-top:6px}
  .sign-out:hover{color:#c0392b}

  /* Main */
  .main{display:flex;flex-direction:column}
  .topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
  .topbar-title{font-size:15px;font-weight:500}
  .content{padding:20px;flex:1}

  /* Metrics */
  .metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
  .metric{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:14px}
  .metric-label{font-size:11px;color:#888;margin-bottom:6px}
  .metric-val{font-size:22px;font-weight:500}
  .metric-sub{font-size:11px;color:#888;margin-top:3px}
  .val-red{color:#c0392b}
  .val-amber{color:#e67e22}
  .val-green{color:#27ae60}

  /* Panel */
  .panel{background:#fff;border:1px solid #e5e5e0;border-radius:10px;overflow:hidden;margin-bottom:14px}
  .panel-head{padding:10px 14px;background:#f9f9f7;border-bottom:1px solid #e5e5e0;font-size:12px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
  .panel-action{font-size:11px;color:#534AB7;cursor:pointer;font-weight:400}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  /* File rows */
  .file-row{display:grid;grid-template-columns:1fr 80px 70px 55px;gap:8px;align-items:center;padding:9px 14px;border-bottom:1px solid #f0f0eb;cursor:pointer;transition:background 0.1s}
  .file-row:hover{background:#f9f9f7}
  .file-row:last-child{border-bottom:none}
  .file-name{font-size:12px;font-weight:500}
  .file-matter{font-size:11px;color:#888;margin-top:1px}
  .badge{font-size:10px;padding:2px 7px;border-radius:10px;text-align:center;white-space:nowrap}
  .badge-family{background:#EEEDFE;color:#3C3489}
  .badge-realestate{background:#E1F5EE;color:#085041}
  .badge-immigration{background:#FAEEDA;color:#633806}
  .badge-civil{background:#FAECE7;color:#4A1B0C}
  .badge-criminal{background:#FBEAF0;color:#4B1528}
  .deadline-urgent{font-size:11px;color:#c0392b;font-weight:500}
  .deadline-soon{font-size:11px;color:#e67e22;font-weight:500}
  .deadline-ok{font-size:11px;color:#27ae60}
  .prog-wrap{height:4px;background:#eee;border-radius:2px;overflow:hidden}
  .prog-fill{height:100%;border-radius:2px}
  .prog-red{background:#c0392b}
  .prog-amber{background:#e67e22}
  .prog-green{background:#27ae60}
  .prog-blue{background:#534AB7}

  /* Alert rows */
  .alert-row{display:flex;gap:8px;padding:9px 14px;border-bottom:1px solid #f0f0eb;align-items:flex-start}
  .alert-row:last-child{border-bottom:none}
  .alert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
  .alert-dot-red{background:#c0392b}
  .alert-dot-amber{background:#e67e22}
  .alert-text{font-size:12px}
  .alert-sub{font-size:11px;color:#888;margin-top:1px}

  /* Buttons */
  .btn{padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:12px;color:#333;transition:all 0.15s}
  .btn:hover{background:#f5f5f0}
  .btn-primary{background:#3C3489;color:#EEEDFE;border-color:#3C3489}
  .btn-primary:hover{background:#534AB7}
  .btn-sm{padding:5px 10px;font-size:11px}

  /* Forms */
  .form-group{margin-bottom:14px}
  .form-label{font-size:12px;font-weight:500;margin-bottom:5px;display:block}
  .form-input{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;background:#fff;color:#1a1a1a}
  .form-input:focus{outline:none;border-color:#534AB7}
  .form-select{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;background:#fff;color:#1a1a1a}
  select.form-input{padding:7px 10px}

  /* Checklist */
  .stage-block{border-bottom:1px solid #f0f0eb}
  .stage-block:last-child{border-bottom:none}
  .stage-head{padding:10px 14px;background:#f9f9f7;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;user-select:none}
  .stage-head:hover{background:#f5f5f0}
  .stage-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .stage-items{display:none;padding:4px 0}
  .stage-items.open{display:block}
  .ck-item{display:flex;align-items:flex-start;gap:8px;padding:8px 14px;border-bottom:1px solid #f5f5f0;font-size:12px}
  .ck-item:last-child{border-bottom:none}
  .ck-box{width:15px;height:15px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;margin-top:1px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
  .ck-box.done{background:#534AB7;border-color:#534AB7}
  .ck-box.done::after{content:'';width:8px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
  .ck-label{flex:1;line-height:1.5}
  .ck-note{font-size:11px;color:#888;margin-top:2px}
  .ck-flag{font-size:11px;color:#c0392b;font-weight:500;margin-top:2px}
  .ck-clio{font-size:10px;color:#534AB7;margin-top:2px}

  /* Hold banner */
  .hold-banner{background:#FFF8E7;border:1px solid #f0c060;border-radius:8px;padding:9px 12px;font-size:12px;color:#7a5a00;margin-bottom:14px;display:flex;align-items:center;gap:8px}

  /* File detail layout */
  .detail-grid{display:grid;grid-template-columns:1fr 180px;gap:14px}
  .side-card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;overflow:hidden;margin-bottom:10px}
  .side-card-head{padding:8px 12px;background:#f9f9f7;border-bottom:1px solid #e5e5e0;font-size:11px;font-weight:500;color:#666}
  .side-card-body{padding:12px}
  .side-stat-val{font-size:18px;font-weight:500}
  .side-stat-sub{font-size:11px;color:#888;margin-top:2px}

  /* Tabs */
  .tabs{display:flex;border-bottom:1px solid #e5e5e0;background:#fff;margin-bottom:0}
  .tab{padding:8px 16px;font-size:12px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:#3C3489;border-bottom-color:#534AB7;font-weight:500}

  /* Staff table */
  .staff-row{display:grid;grid-template-columns:32px 1fr 90px 70px 70px;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid #f0f0eb}
  .staff-row:last-child{border-bottom:none}
  .staff-init{width:32px;height:32px;border-radius:50%;background:#E1F5EE;color:#085041;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}

  /* Modal */
  .modal-overlay{position:absolute;top:0;left:0;right:0;min-height:100%;background:rgba(0,0,0,0.4);display:flex;align-items:flex-start;justify-content:center;padding-top:60px;z-index:100}
  .modal{background:#fff;border-radius:12px;padding:20px;width:480px;max-width:90vw}
  .modal h3{font-size:15px;font-weight:500;margin-bottom:16px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

  /* Audit */
  .audit-row{display:grid;grid-template-columns:1fr 80px 80px 80px 90px;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid #f0f0eb;font-size:12px}
  .audit-row:last-child{border-bottom:none}

  /* Responsive */
  @media(max-width:768px){
    .shell{grid-template-columns:1fr}
    .sidebar{display:none}
    .metric-grid{grid-template-columns:1fr 1fr}
    .two-col{grid-template-columns:1fr}
    .detail-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <h1>HKS Law</h1>

<!-- APP SHELL -->
<div id="app-shell" class="shell hidden" style="position:relative">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="firm">HKS Law</div>
      <div class="sub">Practice management</div>
    </div>
    <div class="nav-section">Overview</div>

  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Dashboard</span>
      <span style="font-size:11px;color:#888" id="topbar-date"></span>

const ALLOWED_EMAILS = [
  'ayushi.hkslaw@gmail.com',

  'sales@hkslaw.ca',

const OWNER_EMAILS = ['hkslawyer@gmail.com','lawyer@hkslaw.ca']

// ═══════════════════════════════════════════
// SUPABASE INIT
// ═══════════════════════════════════════════
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

let currentUser = null
let currentView = 'dashboard'
let currentFileId = null

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
async function signInWithGoogle() {
  const { error } = await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  })
  if (error) showLoginError(error.message)
}

async function signOut() {
  await db.auth.signOut()
  location.reload()
}

function showLoginError(msg) {
  const el = document.getElementById('login-error')
  el.textContent = msg
  el.classList.remove('hidden')
}

async function initAuth() {
  const { data: { session } } = await db.auth.getSession()
  if (session?.user) {
    const email = session.user.email.toLowerCase()
    if (!ALLOWED_EMAILS.includes(email)) {
      await db.auth.signOut()
      showLoginError('Access denied. This system is restricted to HKS Law staff only.')
      return
    }
    currentUser = {
      id: session.user.id,
      email,
      name: session.user.user_metadata?.full_name || email.split('@')[0],
      isOwner: OWNER_EMAILS.includes(email),
    }
    bootApp()
  }

  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      const email = session.user.email.toLowerCase()
      if (!ALLOWED_EMAILS.includes(email)) {
        await db.auth.signOut()
        showLoginError('Access denied.')
        return
      }
      currentUser = {
        id: session.user.id,
        email,
        name: session.user.user_metadata?.full_name || email.split('@')[0],
        isOwner: OWNER_EMAILS.includes(email),
      }
      bootApp()
    }
  })
}

function bootApp() {
  document.getElementById('login-screen').classList.add('hidden')
  document.getElementById('app-shell').classList.remove('hidden')
  const initials = currentUser.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)
  document.getElementById('user-avatar').textContent = initials
  document.getElementById('user-name').textContent = currentUser.name
  document.getElementById('user-role').textContent = currentUser.isOwner ? 'Owner' : 'Staff'
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'})
  if (!currentUser.isOwner) document.getElementById('staff-nav').classList.add('hidden')
  showView('dashboard', document.querySelector('.nav-item.active'))
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
const VIEW_TITLES = {dashboard:'Firm dashboard',files:'Active files',newfile:'New file',audit:'Audit reports',staff:'Staff management',filedetail:'File detail'}

function showView(view, navEl) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'))
  if (navEl) navEl.classList.add('active')
  document.getElementById('topbar-title').textContent = VIEW_TITLES[view] || view
  currentView = view
  const content = document.getElementById('main-content')
  content.innerHTML = '<div style="text-align:center;padding:40px;color:#888;font-size:13px">Loading...</div>'
  if (view === 'dashboard') renderDashboard()
  else if (view === 'files') renderFiles()
  else if (view === 'newfile') renderNewFile()
  else if (view === 'audit') renderAudit()
  else if (view === 'staff') renderStaff()
}

// DATABASE HELPERS
// ═══════════════════════════════════════════
async function getFiles(ownerOnly = false) {
  let query = db.from('files').select('*').eq('status','active').order('deadline',{ascending:true})
  if (!currentUser.isOwner) query = query.eq('assigned_to_email', currentUser.email)
  const { data } = await query
  return data || []
}

async function getFileTicks(fileId) {
  const { data } = await db.from('checklist_ticks').select('*').eq('file_id', fileId)
  return data || []
}

async function saveTick(fileId, stage, itemKey, completed) {
  await db.from('checklist_ticks').upsert({
    file_id: fileId,
    stage,
    item_key: itemKey,
    completed,
    completed_at: completed ? new Date().toISOString() : null,
    completed_by_email: currentUser.email,
    completed_by_name: currentUser.name,
  }, { onConflict: 'file_id,stage,item_key' })
  await db.from('files').update({ last_activity_at: new Date().toISOString() }).eq('id', fileId)
}

async function createFile(data) {
  const { data: file, error } = await db.from('files').insert({
    ...data,
    created_by_email: currentUser.email,
    status: 'active',
    last_activity_at: new Date().toISOString(),
  }).select().single()
  return { file, error }
}

async function logHold(fileId, reason) {
  await db.from('holds').insert({
    file_id: fileId,
    reason,
    logged_by_email: currentUser.email,
    logged_by_name: currentUser.name,
    approved: false,
    expires_at: new Date(Date.now() + 30*24*60*60*1000).toISOString(),
  })
  await db.from('files').update({ last_activity_at: new Date().toISOString() }).eq('id', fileId)
}

async function getHolds(fileId) {
  const { data } = await db.from('holds').select('*').eq('file_id', fileId).eq('approved', false)
  return data || []
}

async function approveHold(holdId) {
  await db.from('holds').update({ approved: true, approved_at: new Date().toISOString() }).eq('id', holdId)
}

function daysDiff(dateStr) {
  return Math.ceil((new Date(dateStr) - new Date()) / (1000*60*60*24))
}

function pct(ticks) {
  if (!ticks || ticks.length === 0) return 0
  return Math.round(ticks.filter(t=>t.completed).length / ticks.length * 100)
}

function progClass(p) {
  return p >= 75 ? 'prog-green' : p >= 40 ? 'prog-amber' : 'prog-red'
}

function deadlineClass(days) {
  return days <= 3 ? 'deadline-urgent' : days <= 10 ? 'deadline-soon' : 'deadline-ok'
}

function badgeClass(area) {
  const m = {'Family':'family','Real estate':'realestate','Immigration':'immigration','Criminal':'criminal','Civil':'civil'}
  return 'badge-' + (m[area] || 'family')
}

async function renderDashboard() {
  const files = await getFiles()
  const allTicks = await Promise.all(files.map(f => getFileTicks(f.id)))
  const allHolds = await Promise.all(files.map(f => getHolds(f.id)))

  const stalled = files.filter((f,i) => {
    const days = Math.ceil((new Date() - new Date(f.last_activity_at)) / (1000*60*60*24))
    return days >= 7 && allHolds[i].length === 0
  })

  const urgent = files.filter(f => daysDiff(f.deadline) <= 3)
  const tickPcts = allTicks.map(t => pct(t))
  const avgCompliance = tickPcts.length ? Math.round(tickPcts.reduce((a,b)=>a+b,0)/tickPcts.length) : 0

  let html = `
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Active files</div><div class="metric-val">${files.length}</div><div class="metric-sub">across all practice areas</div></div>
      <div class="metric"><div class="metric-label">Stalled files</div><div class="metric-val ${stalled.length>0?'val-red':''}">${stalled.length}</div><div class="metric-sub">no activity 7+ days</div></div>
      <div class="metric"><div class="metric-label">Urgent deadlines</div><div class="metric-val ${urgent.length>0?'val-amber':''}">${urgent.length}</div><div class="metric-sub">within 3 days</div></div>
      <div class="metric"><div class="metric-label">Compliance rate</div><div class="metric-val ${avgCompliance<50?'val-red':avgCompliance<75?'val-amber':'val-green'}">${avgCompliance}%</div><div class="metric-sub">checklists completed</div></div>
    </div>
    <div class="two-col">
      <div>
        <div class="panel">
          <div class="panel-head">Active files — by deadline <span class="panel-action" onclick="showView('files',null)">View all</span></div>`

  if (files.length === 0) {
    html += '<div style="padding:20px;text-align:center;color:#888;font-size:12px">No active files. <span style="color:#534AB7;cursor:pointer" onclick="showView(\'newfile\',null)">Create your first file →</span></div>'
  } else {
    files.slice(0,8).forEach((f,i) => {
      const p = tickPcts[i]
      const days = daysDiff(f.deadline)
      html += `
        <div class="file-row" onclick="openFile('${f.id}')">
          <div><div class="file-name">${f.client_name}</div><div class="file-matter">${f.matter_type}</div></div>
          <span class="badge ${badgeClass(f.practice_area)}">${f.practice_area}</span>
          <span class="${deadlineClass(days)}">${days}d</span>
          <div><div class="prog-wrap"><div class="prog-fill ${progClass(p)}" style="width:${p}%"></div></div><div style="font-size:10px;color:#888;margin-top:2px">${p}%</div></div>
        </div>`
    })
  }

  html += `</div></div>
      <div>
        <div class="panel">
          <div class="panel-head">Stalled — action required</div>`

  if (stalled.length === 0) {
    html += '<div style="padding:14px;font-size:12px;color:#27ae60">No stalled files. Good work.</div>'
  } else {
    stalled.forEach(f => {
      const days = Math.ceil((new Date() - new Date(f.last_activity_at)) / (1000*60*60*24))
      html += `<div class="alert-row" onclick="openFile('${f.id}')" style="cursor:pointer">
        <div class="alert-dot alert-dot-red"></div>
        <div><div class="alert-text">${f.client_name}</div><div class="alert-sub">${f.matter_type} · No activity ${days} days</div></div>
      </div>`
    })
  }

  html += `</div>`

  if (currentUser.isOwner) {
    html += `
        <div class="panel" style="margin-top:14px">
          <div class="panel-head">Quick actions</div>
          <div style="padding:12px;display:flex;flex-direction:column;gap:8px">
            <button class="btn btn-primary" onclick="showView('newfile',null)" style="width:100%">+ Open new file</button>
            <button class="btn" onclick="showView('audit',null)" style="width:100%">View audit report</button>
          </div>
        </div>`
  }

  html += `</div></div>`

  document.getElementById('main-content').innerHTML = html
}

async function submitNewFile() {
  const clientName = document.getElementById('nf-client').value.trim()
  const matterType = document.getElementById('nf-matter').value
  const matterNumber = document.getElementById('nf-number').value.trim()
  const deadline = document.getElementById('nf-deadline').value
  const assignedEmail = document.getElementById('nf-assigned').value
  const notes = document.getElementById('nf-notes').value.trim()

  if (!clientName || !matterType || !matterNumber || !deadline) {
    document.getElementById('nf-error').textContent = 'Please fill in all required fields.'
    return
  }

  const { file, error } = await createFile({
    client_name: clientName,
    matter_type: matterType,
    matter_number: matterNumber,
    practice_area: PRACTICE_AREAS[matterType],
    deadline,
    assigned_to_email: assignedEmail,
    assigned_to_name: assignedEmail.split('@')[0],
    notes,
  })

  if (error) {
    document.getElementById('nf-error').textContent = 'Error: ' + error.message
    return
  }

  openFile(file.id)
}

async function openFile(fileId) {
  currentFileId = fileId
  document.getElementById('topbar-title').textContent = 'File detail'
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'))

  const { data: file } = await db.from('files').select('*').eq('id', fileId).single()
  if (!file) return

  const ticks = await getFileTicks(fileId)
  const holds = await getHolds(fileId)
  const checklistKey = MATTER_TYPES[file.matter_type] || 'FAMILY_SEP'
  const stages = CHECKLISTS[checklistKey]
  const totalItems = stages.reduce((s,st)=>s+st.items.length,0)
  const doneItems = ticks.filter(t=>t.completed).length
  const completion = totalItems > 0 ? Math.round(doneItems/totalItems*100) : 0
  const days = daysDiff(file.deadline)

  let html = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap">
      <div>
        <div style="font-size:16px;font-weight:500">${file.client_name}</div>
        <div style="font-size:12px;color:#888;margin-top:2px">${file.matter_type} · ${file.matter_number} · Assigned: ${file.assigned_to_name || file.assigned_to_email}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-sm" onclick="showLogHold('${fileId}')">Log hold</button>
        ${currentUser.isOwner ? `<button class="btn btn-sm" onclick="showHoldApprovals('${fileId}')">Review holds</button>` : ''}
        <button class="btn btn-primary btn-sm" onclick="generateAuditPrint('${fileId}')">Print audit trail</button>
        ${currentUser.isOwner && file.status !== 'closed' ? `<button class="btn btn-sm" style="color:#c0392b;border-color:#c0392b" onclick="closeFile('${fileId}')">Close file</button>` : ''}
      </div>
    </div>`

  if (holds.length > 0) {
    holds.forEach(h => {
      html += `<div class="hold-banner">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#7a5a00" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3M8 11h.01"/></svg>
        Active hold: ${h.reason} — logged ${new Date(h.created_at).toLocaleDateString('en-CA')}${currentUser.isOwner ? ` <span style="color:#534AB7;cursor:pointer;margin-left:8px" onclick="approveHoldUI('${h.id}','${fileId}')">Approve</span>` : ''}
      </div>`
    })
  }

  html += `<div class="detail-grid">
    <div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab(this,'tab-checklist')">Checklist</div>
        <div class="tab" onclick="switchTab(this,'tab-notes')">Notes</div>
      </div>
      <div id="tab-checklist" class="panel" style="border-top-left-radius:0;border-top-right-radius:0;border-top:none;margin-top:0">`

  stages.forEach(stage => {
    const stageTicks = ticks.filter(t=>t.stage===stage.stage)
    const stageDone = stageTicks.filter(t=>t.completed).length
    const stageTotal = stage.items.length
    const stageComplete = stageDone === stageTotal
    const stageStarted = stageDone > 0
    const dotColor = stageComplete ? '#27ae60' : stageStarted ? '#e67e22' : '#ddd'

    html += `
      <div class="stage-block">
        <div class="stage-head" onclick="toggleStage(this)">
          <div class="stage-dot" style="background:${dotColor}"></div>
          ${stage.title} · ${stageDone}/${stageTotal}
          <span style="margin-left:auto;font-size:10px;color:#aaa">▾</span>
        </div>
        <div class="stage-items ${stage.stage===1||stageStarted?'open':''}">`

    stage.items.forEach(item => {
      const tick = ticks.find(t=>t.stage===stage.stage && t.item_key===item.key)
      const done = tick?.completed || false
      html += `
        <div class="ck-item">
          <div class="ck-box ${done?'done':''}" onclick="toggleTick('${fileId}',${stage.stage},'${item.key}',this)"></div>
          <div class="ck-label">
            ${item.label}
            ${item.note?`<div class="ck-note">${item.note}</div>`:''}
            ${item.flag?`<div class="ck-flag">⚑ ${item.flag}</div>`:''}
            ${item.clio?`<div class="ck-clio">→ ${item.clio}</div>`:''}
            ${done&&tick?.completed_by_name?`<div style="font-size:10px;color:#aaa;margin-top:2px">✓ ${tick.completed_by_name} · ${new Date(tick.completed_at).toLocaleDateString('en-CA')}</div>`:''}
          </div>
        </div>`
    })

    html += `</div></div>`
  })

  html += `</div>
      <div id="tab-notes" class="panel" style="display:none;padding:14px">
        <div style="font-size:12px;color:#888;margin-bottom:10px">File notes</div>
        <textarea class="form-input" id="file-notes-input" rows="6" placeholder="Add notes about this file...">${file.notes || ''}</textarea>
        <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="saveNotes('${fileId}')">Save notes</button>
      </div>
    </div>

    <div>
      <div class="side-card">
        <div class="side-card-head">Completion</div>
        <div class="side-card-body">
          <div class="side-stat-val" style="color:${completion>=75?'#27ae60':completion>=40?'#e67e22':'#c0392b'}">${completion}%</div>
          <div class="prog-wrap" style="margin-top:8px;height:6px"><div class="prog-fill ${progClass(completion)}" style="width:${completion}%"></div></div>
          <div class="side-stat-sub">${doneItems} of ${totalItems} items</div>
        </div>
      </div>
      <div class="side-card">
        <div class="side-card-head">Deadline</div>
        <div class="side-card-body">
          <div class="side-stat-val ${days<=3?'val-red':days<=10?'val-amber':''}">${new Date(file.deadline).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'})}</div>
          <div class="side-stat-sub ${days<=3?'val-red':''}">${days} days remaining</div>
        </div>
      </div>
      <div class="side-card">
        <div class="side-card-head">Practice area</div>
        <div class="side-card-body">
          <span class="badge ${badgeClass(file.practice_area)}" style="font-size:12px;padding:4px 10px">${file.practice_area}</span>
        </div>
      </div>
      <div class="side-card">
        <div class="side-card-head">Last activity</div>
        <div class="side-card-body">
          <div class="side-stat-val" style="font-size:14px">${new Date(file.last_activity_at).toLocaleDateString('en-CA',{month:'short',day:'numeric'})}</div>
          <div class="side-stat-sub">${Math.ceil((new Date()-new Date(file.last_activity_at))/(1000*60*60*24))} days ago</div>
        </div>
      </div>
      <button class="btn" style="width:100%;margin-top:4px;font-size:12px" onclick="showView('files',null)">← Back to files</button>
    </div>
  </div>`

  document.getElementById('main-content').innerHTML = html
}

function toggleStage(el) {
  const items = el.nextElementSibling
  items.classList.toggle('open')
  el.querySelector('span:last-child').textContent = items.classList.contains('open') ? '▴' : '▾'
}

function switchTab(tabEl, showId) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  tabEl.classList.add('active')
  document.getElementById('tab-checklist').style.display = showId==='tab-checklist' ? 'block' : 'none'
  document.getElementById('tab-notes').style.display = showId==='tab-notes' ? 'block' : 'none'
}

async function toggleTick(fileId, stage, itemKey, el) {
  const done = !el.classList.contains('done')
  el.classList.toggle('done', done)
  await saveTick(fileId, stage, itemKey, done)
  // Refresh completion stats in sidebar
  const ticks = await getFileTicks(fileId)
  const { data: file } = await db.from('files').select('*').eq('id', fileId).single()
  const checklistKey = MATTER_TYPES[file.matter_type] || 'FAMILY_SEP'
  const stages = CHECKLISTS[checklistKey]
  const totalItems = stages.reduce((s,st)=>s+st.items.length,0)
  const doneItems = ticks.filter(t=>t.completed).length
  const completion = totalItems > 0 ? Math.round(doneItems/totalItems*100) : 0
  const pctEl = document.querySelector('.side-stat-val')
  if (pctEl) pctEl.textContent = completion + '%'
}

async function saveNotes(fileId) {
  const notes = document.getElementById('file-notes-input').value
  await db.from('files').update({ notes, last_activity_at: new Date().toISOString() }).eq('id', fileId)
  alert('Notes saved.')
}

async function closeFile(fileId) {
  if (!confirm('Mark this file as closed? Make sure the audit trail has been generated and uploaded to Clio first.')) return
  await db.from('files').update({ status: 'closed' }).eq('id', fileId)
  showView('files', null)
}

function showLogHold(fileId) {
  const modal = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Log a hold</h3>
        <div class="form-group">
          <label class="form-label">Reason for hold</label>
          <textarea class="form-input" id="hold-reason" rows="3" placeholder="e.g. Waiting on client financial disclosure documents..."></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="submitHold('${fileId}')">Log hold</button>
        </div>
      </div>
    </div>`
  document.getElementById('modal-container').innerHTML = modal
}

async function submitHold(fileId) {
  const reason = document.getElementById('hold-reason').value.trim()
  if (!reason) return
  await logHold(fileId, reason)
  closeModal()
  openFile(fileId)
}

async function showHoldApprovals(fileId) {
  const holds = await getHolds(fileId)
  if (holds.length === 0) { alert('No pending holds on this file.'); return }
  const list = holds.map(h => `
    <div style="padding:10px 0;border-bottom:1px solid #f0f0eb">
      <div style="font-size:13px;font-weight:500">${h.reason}</div>
      <div style="font-size:11px;color:#888;margin-top:3px">Logged by ${h.logged_by_name} on ${new Date(h.created_at).toLocaleDateString('en-CA')}</div>
      <button class="btn btn-primary btn-sm" style="margin-top:6px" onclick="approveHoldUI('${h.id}','${fileId}')">Approve hold</button>
    </div>`).join('')
  const modal = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Pending holds</h3>
        ${list}
        <div class="modal-actions"><button class="btn" onclick="closeModal()">Close</button></div>
      </div>
    </div>`
  document.getElementById('modal-container').innerHTML = modal
}

async function approveHoldUI(holdId, fileId) {
  await approveHold(holdId)
  closeModal()
  openFile(fileId)
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = ''
}

async function generateAuditPrint(fileId) {
  const { data: file } = await db.from('files').select('*').eq('id', fileId).single()
  const ticks = await getFileTicks(fileId)
  const holds = await getHolds(fileId)
  const checklistKey = MATTER_TYPES[file.matter_type] || 'FAMILY_SEP'
  const stages = CHECKLISTS[checklistKey]
  const totalItems = stages.reduce((s,st)=>s+st.items.length,0)
  const doneItems = ticks.filter(t=>t.completed).length
  const retentionYear = new Date().getFullYear() + 10

  const w = window.open('','_blank')
  w.document.write(`<!DOCTYPE html><html><head><title>HKS Law — Audit Trail — ${file.matter_number}</title>
  <style>body{font-family:Arial,sans-serif;font-size:12px;color:#333;padding:30px;max-width:800px;margin:0 auto}

  .item{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid #f0f0f0}.check{width:14px;height:14px;border:1px solid #ccc;border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .done-check{background:#3C3489;border-color:#3C3489;color:#fff;font-size:9px}.item-label{flex:1}.item-meta{font-size:10px;color:#999}
  @media print{body{padding:15px}}</style></head><body>
  <h1>HKS Law — File Audit Trail</h1>
  <div class="meta">
    <strong>Client:</strong> ${file.client_name} &nbsp;|&nbsp;
    <strong>Matter:</strong> ${file.matter_type} &nbsp;|&nbsp;
    <strong>Matter No:</strong> ${file.matter_number}<br>

    <strong>Assigned to:</strong> ${file.assigned_to_name || file.assigned_to_email}<br>
    <strong>Opened:</strong> ${new Date(file.created_at).toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'})} &nbsp;|&nbsp;
    <strong>Audit generated:</strong> ${new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}<br>
    <strong>Generated by:</strong> ${currentUser.name} (${currentUser.email})<br>
    <strong>Completion:</strong> ${doneItems} of ${totalItems} checklist items completed
  </div>
  <h2>Checklist audit</h2>`)

  stages.forEach(stage => {
    w.document.write(`<div class="stage-title">${stage.title}</div>`)
    stage.items.forEach(item => {
      const tick = ticks.find(t=>t.stage===stage.stage && t.item_key===item.key)
      const done = tick?.completed
      w.document.write(`<div class="item">
        <div class="check ${done?'done-check':''}">${done?'✓':''}</div>
        <div class="item-label">${item.label}
          ${done&&tick?.completed_by_name?`<div class="item-meta">Completed by ${tick.completed_by_name} on ${new Date(tick.completed_at).toLocaleDateString('en-CA')}</div>`:''}
          ${!done?'<div class="item-meta" style="color:#c0392b">Not completed</div>':''}
        </div>
      </div>`)
    })
  })

  if (holds.length > 0) {
    w.document.write('<h2>Holds logged</h2>')
    holds.forEach(h => {
      w.document.write(`<div style="padding:6px 0;border-bottom:1px solid #f0f0f0"><strong>${h.reason}</strong><br><span style="font-size:10px;color:#888">Logged by ${h.logged_by_name} on ${new Date(h.created_at).toLocaleDateString('en-CA')}</span></div>`)
    })
  }

  w.document.write(`
  <h2>File retention</h2>
  <p>This file must be retained until <strong>${retentionYear}</strong> per Law Society of Ontario requirements (minimum 10 years from closing date). Destruction requires lawyer authorization and must comply with LSO file destruction procedures.</p>
  <h2>Compliance declaration</h2>
  <p>This audit trail was generated from the HKS Law Practice Management System on ${new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'})}. It serves as a record of checklist compliance for LSO and LawPRO purposes.</p>
  <div style="margin-top:40px;border-top:1px solid #ddd;padding-top:14px;font-size:11px;color:#888">HKS Law Professional Corporation · Kitchener, Ontario · hkslaw.ca</div>
  <script>window.onload=function(){window.print()}<\/script>
  </body></html>`)
  w.document.close()
}

async function renderAudit() {
  const files = await getFiles()
  const allTicks = await Promise.all(files.map(f => getFileTicks(f.id)))
  const allHolds = await Promise.all(files.map(f => getHolds(f.id)))

  const stalled = files.filter((f,i) => {
    const days = Math.ceil((new Date() - new Date(f.last_activity_at)) / (1000*60*60*24))
    return days >= 7 && allHolds[i].length === 0
  })

  const pendingHolds = allHolds.flat()

  let html = `
    <div class="metric-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="metric"><div class="metric-label">Files audited</div><div class="metric-val">${files.length}</div></div>
      <div class="metric"><div class="metric-label">Stalled files</div><div class="metric-val ${stalled.length>0?'val-red':''}">${stalled.length}</div></div>
      <div class="metric"><div class="metric-label">Holds pending approval</div><div class="metric-val ${pendingHolds.length>0?'val-amber':''}">${pendingHolds.length}</div></div>
    </div>
    <div class="panel">
      <div class="panel-head">File audit summary</div>
      <div style="display:grid;grid-template-columns:1fr 80px 80px 90px 100px;gap:8px;padding:7px 14px;background:#f9f9f7;font-size:11px;color:#888;font-weight:500">
        <span>File</span><span>Assigned</span><span>Progress</span><span>Last activity</span><span>Status</span>
      </div>`

  files.forEach((f,i) => {
    const p = pct(allTicks[i])
    const activityDays = Math.ceil((new Date() - new Date(f.last_activity_at)) / (1000*60*60*24))
    const isStalled = activityDays >= 7 && allHolds[i].length === 0
    const hasHold = allHolds[i].length > 0
    const statusLabel = isStalled ? '<span style="color:#c0392b;font-weight:500">Stalled</span>' : hasHold ? '<span style="color:#e67e22">On hold</span>' : '<span style="color:#27ae60">Active</span>'
    html += `
      <div class="audit-row" onclick="openFile('${f.id}')" style="cursor:pointer" onmouseover="this.style.background='#f9f9f7'" onmouseout="this.style.background=''">
        <div><div class="file-name">${f.client_name}</div><div class="file-matter">${f.matter_type}</div></div>
        <span style="font-size:11px;color:#666">${f.assigned_to_name || f.assigned_to_email.split('@')[0]}</span>
        <span style="font-size:11px;color:${p>=75?'#27ae60':p>=40?'#e67e22':'#c0392b'}">${p}%</span>
        <span style="font-size:11px;color:${activityDays>=7?'#c0392b':'#666'}">${activityDays}d ago</span>
        ${statusLabel}
      </div>`
  })

  html += '</div>'
  document.getElementById('main-content').innerHTML = html
}

async function renderStaff() {
  if (!currentUser.isOwner) return

  const staffList = ALLOWED_EMAILS.filter(e => !OWNER_EMAILS.includes(e))
  const files = await getFiles()

  let html = `
    <div class="panel">
      <div class="panel-head">Staff & access</div>
      <div style="padding:12px 14px;font-size:12px;color:#888;border-bottom:1px solid #f0f0eb">
        Staff log in using Google at this URL. Only the emails below can access the system.
      </div>`

  const allEmails = [...OWNER_EMAILS, ...staffList]
  allEmails.forEach(email => {
    const isOwner = OWNER_EMAILS.includes(email)
    const name = email.split('@')[0].replace(/\./g,' ').replace(/\b\w/g,l=>l.toUpperCase())
    const initials = name.split(' ').map(n=>n[0]).join('').slice(0,2)
    const assignedFiles = files.filter(f=>f.assigned_to_email===email)
    html += `
      <div class="staff-row">
        <div class="staff-init">${initials}</div>
        <div>
          <div style="font-size:12px;font-weight:500">${email}</div>
          <div style="font-size:11px;color:#888">${isOwner?'Owner':'Staff'}</div>
        </div>
        <span class="badge ${isOwner?'badge-family':'badge-realestate'}">${isOwner?'Owner':'Staff'}</span>
        <span style="font-size:11px;color:#666">${assignedFiles.length} files</span>
        <span style="font-size:11px;color:#27ae60">Active</span>
      </div>`
  })

  html += '</div>'
  document.getElementById('main-content').innerHTML = html
}
